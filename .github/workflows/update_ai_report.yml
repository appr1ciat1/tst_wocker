name: AI Quant Trading Report v9

# 讓 github-actions[bot] 能 commit/push 回 main(否則 push 會 403)
permissions:
  contents: write

on:
  schedule:
    # 每週一到五 UTC 09:17 執行（台灣時間 17:17 收盤後，避開 GitHub Actions 整點高峰）
    - cron: '17 9 * * 1-5'
    # 每月 1 日 UTC 10:00 跑月報
    - cron: '0 10 1 * *'
  workflow_dispatch:
    inputs:
      tp_atr:
        description: 'ATR 停利倍數'
        required: false
        default: '4.0'
      sl_atr:
        description: 'ATR 停損倍數'
        required: false
        default: '3.0'
      hold_days:
        description: '最大持倉天數'
        required: false
        default: '20'
      top_k:
        description: '每日最多進場股票數'
        required: false
        default: '7'
      days:
        description: '回測天數'
        required: false
        default: '1200'
      gap_filter:
        description: '跳空過濾 ATR 倍數'
        required: false
        default: '1.5'

# 防止多個 run 同時 push 造成 race condition
concurrency:
  group: ai-report-main
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # This repo contains large tracked market data. A full-history fetch can
          # exhaust the hosted runner before the job even starts.
          fetch-depth: 1
          fetch-tags: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Quant Pipeline v9 (V3 production params)
        if: github.event.schedule != '0 10 1 * *'
        run: |
          python ai_report.py \
            --hybrid-tiered \
            --regime-filter \
            --regime-graduated \
            --breadth-regime \
            --regime-floor 0.10 \
            --tp-atr ${{ github.event.inputs.tp_atr || '4.0' }} \
            --sl-atr ${{ github.event.inputs.sl_atr || '3.0' }} \
            --hold-days ${{ github.event.inputs.hold_days || '20' }} \
            --top-k ${{ github.event.inputs.top_k || '7' }} \
            --gap-filter ${{ github.event.inputs.gap_filter || '1.5' }} \
            --days ${{ github.event.inputs.days || '1200' }}

      # 比較頁產生器同時輸出「正確的」paper_trading.html(v9 production,自 4/22 真實引擎損益)
      # 取代舊版 paper_tracker.py(其 live/replay 路徑都會凍結損益,已停用)
      - name: Strategy Comparison + Paper Dashboard (v8.5 / v9 / v9+反轉)
        if: github.event.schedule != '0 10 1 * *'
        run: python -m twstk.report.compare --start 2022-01-01 --out strategy_compare.html

      - name: Monthly Paper Trading Report
        if: github.event.schedule == '0 10 1 * *'
        run: python paper_trade.py monthly

      - name: Cleanup old artifacts (keep last 180 days)
        run: |
          if [ -d "artifacts" ]; then
            find artifacts/ -type f -mtime +180 -delete 2>/dev/null || true
          fi

      - name: Commit and push
        run: |
          git config --global user.email "voidful.stack@gmail.com"
          git config --global user.name "Voidful"

          git add stock_report.html backtest_chart.png paper_trading.html paper_equity.json strategy_compare.html || true
          git add -u artifacts || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "📊 AI Report v9 (Hybrid Tiered) + Paper Trading ($(date -u '+%Y-%m-%d'))"
          fi

          # Rebase onto latest remote without downloading the full repository history.
          git fetch --no-tags --depth=50 origin main:refs/remotes/origin/main
          git rebase --autostash origin/main

          git push origin HEAD:main

  # 每季第一週自動跑 sweep + Monte Carlo + Walk-Forward
  quarterly-health-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Check if quarterly (first week of Jan/Apr/Jul/Oct)
        id: check
        run: |
          DAY=$(date -u '+%d')
          MONTH=$(date -u '+%m')
          if [ "$DAY" -le 7 ] && ([ "$MONTH" = "01" ] || [ "$MONTH" = "04" ] || [ "$MONTH" = "07" ] || [ "$MONTH" = "10" ]); then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.run == 'true'
        with:
          # Keep checkout shallow; full history is too large for hosted runners.
          fetch-depth: 1
          fetch-tags: false

      - uses: actions/setup-python@v6
        if: steps.check.outputs.run == 'true'
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Quick Sweep
        if: steps.check.outputs.run == 'true'
        run: python sweep.py --quick --output csv

      - name: Walk-Forward Validation
        if: steps.check.outputs.run == 'true'
        run: python walk_forward.py

      - name: Monte Carlo Stress Test (Block Bootstrap)
        if: steps.check.outputs.run == 'true'
        run: |
          LATEST_EQUITY=$(ls -t artifacts/equity_*.csv | head -1)
          python monte_carlo.py --equity "$LATEST_EQUITY" --runs 2000 --block-size 5

      - name: Upload quarterly report
        if: steps.check.outputs.run == 'true'
        run: |
          git config --global user.email "voidful.stack@gmail.com"
          git config --global user.name "Voidful"

          git add factor_search_results.csv ablation_results.csv backtest_chart.png || true
          git add -u artifacts || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Quarterly health check ($(date -u '+%Y-%m-%d'))"
          fi

          # Rebase onto latest remote without downloading the full repository history.
          git fetch --no-tags --depth=50 origin main:refs/remotes/origin/main
          git rebase --autostash origin/main

          git push origin HEAD:main
