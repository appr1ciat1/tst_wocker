name: AI Quant Trading Report v2

on:
  schedule:
    # 每週一到五 UTC 09:00 執行（台灣時間 17:00 收盤後）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      tp_sl_mode:
        description: 'TP/SL 模式: atr 或 fixed'
        required: false
        default: 'atr'
      tp_atr:
        description: 'ATR 模式停利倍數'
        required: false
        default: '3.0'
      sl_atr:
        description: 'ATR 模式停損倍數'
        required: false
        default: '1.5'
      hold_days:
        description: '最大持倉天數'
        required: false
        default: '20'
      top_k:
        description: '每日最多進場股票數'
        required: false
        default: '3'
      universe_size:
        description: '動態 Universe 大小'
        required: false
        default: '50'

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Quant Pipeline v2
        run: |
          TP_SL_MODE=${{ github.event.inputs.tp_sl_mode || 'atr' }}
          TP_ATR=${{ github.event.inputs.tp_atr || '3.0' }}
          SL_ATR=${{ github.event.inputs.sl_atr || '1.5' }}
          HOLD=${{ github.event.inputs.hold_days || '20' }}
          TOP_K=${{ github.event.inputs.top_k || '3' }}
          UNIV=${{ github.event.inputs.universe_size || '50' }}
          python ai_report.py \
            --tp-sl-mode $TP_SL_MODE \
            --tp-atr $TP_ATR \
            --sl-atr $SL_ATR \
            --hold-days $HOLD \
            --top-k $TOP_K \
            --universe-size $UNIV

      - name: Cleanup old artifacts (keep last 180 days)
        run: |
          if [ -d "artifacts" ]; then
            find artifacts/ -type f -mtime +180 -delete 2>/dev/null || true
            echo "🧹 Cleaned artifacts older than 180 days"
          fi

      - name: Commit and push (preserve history)
        run: |
          git config --global user.email "voidful.stack@gmail.com"
          git config --global user.name "Voidful"
          git add -A
          git commit -m "📊 AI Trading Report v2 ($(date -u '+%Y-%m-%d'))" || echo "No changes to commit"
          git push origin main
