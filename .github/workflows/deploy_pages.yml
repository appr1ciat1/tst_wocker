name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'stock_report.html'
      - 'paper_trading.html'
      - 'backtest_chart.png'
      - 'index.html'
      - '.nojekyll'
      - '.github/workflows/deploy_pages.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ['AI Quant Trading Report v9']
    types: [completed]
    branches: [main]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}
          fetch-depth: 1
          fetch-tags: false
          sparse-checkout: |
            stock_report.html
            paper_trading.html
            backtest_chart.png
            index.html
            report_v85.html
            chart_v85.png
            report_guard.html
            chart_guard.png
            report_surge.html
            chart_surge.png
            report_surge_pro.html
            chart_surge_pro.png
            .nojekyll
          sparse-checkout-cone-mode: false

      - name: Prepare static site
        run: |
          mkdir -p _site
          for f in stock_report.html paper_trading.html backtest_chart.png index.html; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
            cp "$f" _site/
          done
          # 四策略頁（v8.5 / GUARD / SURGE / SURGE PRO）：可選，缺檔不致命
          for f in report_v85.html chart_v85.png report_guard.html chart_guard.png report_surge.html chart_surge.png report_surge_pro.html chart_surge_pro.png; do
            if [ -f "$f" ]; then cp "$f" _site/; else echo "optional missing: $f"; fi
          done
          cp .nojekyll _site/ 2>/dev/null || touch _site/.nojekyll
          echo "Site files:"
          ls -lh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4